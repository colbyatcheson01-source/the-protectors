<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <linearGradient id="flame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6f00"/>
      <stop offset="50%" style="stop-color:#ff8f00"/>
      <stop offset="100%" style="stop-color:#ff6f00"/>
    </linearGradient>
  </defs>

  <!-- Skull -->
  <g transform="translate(55, 65)">
    <!-- Main skull shape -->
    <ellipse cx="0" cy="0" rx="28" ry="32" fill="#1a1a1a" stroke="#808080" stroke-width="2"/>
    <!-- Left eye socket -->
    <ellipse cx="-10" cy="-6" rx="7" ry="8" fill="#0a0a0a" stroke="#606060" stroke-width="1.5"/>
    <!-- Right eye socket -->
    <ellipse cx="10" cy="-6" rx="7" ry="8" fill="#0a0a0a" stroke="#606060" stroke-width="1.5"/>
    <!-- Left eye flame -->
    <ellipse cx="-10" cy="-6" rx="4" ry="5" fill="#ff6f00" opacity="0.8"/>
    <!-- Right eye flame -->
    <ellipse cx="10" cy="-6" rx="4" ry="5" fill="#ff6f00" opacity="0.8"/>
    <!-- Nose -->
    <path d="M-4,4 Q0,-2 4,4 Q2,8 -2,8Z" fill="#0a0a0a" stroke="#606060" stroke-width="1"/>
    <!-- Jaw / teeth line -->
    <path d="M-16,10 Q0,18 16,10" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Teeth -->
    <rect x="-12" y="10" width="5" height="6" rx="1" fill="#c0c0c0"/>
    <rect x="-5" y="10" width="5" height="6" rx="1" fill="#c0c0c0"/>
    <rect x="2" y="10" width="5" height="6" rx="1" fill="#c0c0c0"/>
    <rect x="9" y="12" width="5" height="4" rx="1" fill="#c0c0c0"/>
    <!-- Crossed pistons behind skull -->
    <g stroke="#808080" stroke-width="3" stroke-linecap="round">
      <line x1="-45" y1="-25" x2="45" y2="25"/>
      <line x1="45" y1="-25" x2="-45" y2="25"/>
    </g>
    <!-- Piston details -->
    <rect x="-48" y="-28" width="8" height="6" rx="1" fill="#606060"/>
    <rect x="40" y="22" width="8" height="6" rx="1" fill="#606060"/>
    <rect x="42" y="-28" width="8" height="6" rx="1" fill="#606060"/>
    <rect x="-50" y="22" width="8" height="6" rx="1" fill="#606060"/>
  </g>

  <!-- Wings -->
  <g fill="none" stroke="#808080" stroke-width="2">
    <!-- Left wing -->
    <path d="M25,45 Q0,30 -20,35 Q-40,40 -55,55" stroke="#606060"/>
    <path d="M25,50 Q-5,40 -30,48 Q-50,55 -65,70"/>
    <path d="M25,55 Q0,50 -25,58 Q-45,65 -55,80" stroke="#606060"/>
    <!-- Right wing -->
    <path d="M-25,45 Q0,30 20,35 Q40,40 55,55" stroke="#606060"/>
    <path d="M-25,50 Q5,40 30,48 Q50,55 65,70"/>
    <path d="M-25,55 Q0,50 25,58 Q45,65 55,80" stroke="#606060"/>
  </g>

  <!-- Text: THE ENFORCERS -->
  <text x="200" y="55" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" letter-spacing="6">THE ENFORCERS</text>

  <!-- Text: MC -->
  <text x="200" y="88" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="20" fill="#ff6f00" letter-spacing="12">MC</text>

  <!-- Subtitle accent line -->
  <line x1="100" y1="100" x2="300" y2="100" stroke="#606060" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
